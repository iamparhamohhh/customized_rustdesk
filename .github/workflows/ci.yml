name: CI

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  build:
    name: ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }
    steps:
    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v6
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup vcpkg with Github Actions binary cache
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ github.workspace }}/vcpkg
        # Pin vcpkg to the same baseline commit declared in vcpkg.json
        # so run-vcpkg bootstraps the correct toolset version.
        vcpkgGitCommitId: '120deac3062162151622ca4860575a33844ba10b'

    - name: Install vcpkg dependencies
      shell: bash
      run: |
        export VCPKG_DEFAULT_TRIPLET=x64-windows-static
        if ! "$VCPKG_ROOT/vcpkg" \
          install \
          --triplet x64-windows-static \
          --x-install-root="$VCPKG_ROOT/installed"; then
          find "$VCPKG_ROOT/" -name "*.log" | while read -r log_file; do
            echo "$log_file:"
            echo "======"
            cat "$log_file"
            echo "======"
            echo ""
          done
          exit 1
        fi

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: stable
        targets: ${{ matrix.job.target }}
        components: ''

    - name: Show version information (Rust, cargo, GCC)
      shell: bash
      run: |
        rustup -V
        rustup toolchain list
        rustup default
        cargo -V
        rustc -V

    - uses: Swatinem/rust-cache@v2

    - name: Build
      uses: actions-rs/cargo@v1
      with:
        command: build
        args: --locked --target=${{ matrix.job.target }}

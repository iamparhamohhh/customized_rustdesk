name: Flutter CI (Windows only)

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "res/**"
      - "appimage/**"
      - "flatpak/**"

jobs:
  build-windows:
    uses: ./.github/workflows/build-windows-only.yml

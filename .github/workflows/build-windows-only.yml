name: Build Windows (Flutter) - Manual

# Trigger manually from the Actions tab, or automatically via flutter-ci.yml.
# Takes ~30-40 min and produces the Flutter Windows build with your changes.
on:
  workflow_dispatch:
  workflow_call:

env:
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  RUST_VERSION: "stable"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  # ── Job 1: Generate bridge files on Linux (ffigen only works reliably here) ─
  generate-bridge:
    name: Generate Flutter-Rust Bridge
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake curl gcc git g++ \
            libclang-dev libgtk-3-dev llvm-dev nasm ninja-build \
            pkg-config wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: "rustfmt"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-ubuntu

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install bridge codegen tools
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          pushd flutter && flutter pub get && popd

      - name: Generate bridge files
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  # ── Job 2: Build Windows Flutter app ────────────────────────────────────────
  build-windows:
    name: Windows x64 Flutter
    needs: generate-bridge
    runs-on: windows-2022
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Install flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # ── Build the Flutter Windows app ───────────────────────────────────────
      - name: Setup vcpkg with Github Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              cat "$_1"
            done
            exit 1
          fi

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == "${{ env.FLUTTER_VERSION }}" ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff || true

      - name: Install Rust toolchain for app build
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.75"
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - name: Patch theme types for Flutter 3.24.5 compat
        shell: pwsh
        run: |
          # Flutter 3.24.5 uses DialogTheme/TabBarTheme; 3.27+ renamed them to DialogThemeData/TabBarThemeData.
          $f = 'flutter/lib/common.dart'
          (Get-Content $f -Raw) -replace 'DialogThemeData', 'DialogTheme' -replace 'TabBarThemeData', 'TabBarTheme' | Set-Content $f -NoNewline
          Write-Host "Patched theme types in $f"

      - name: Build virtual display library
        shell: bash
        run: |
          cd libs/virtual_display/dylib
          cargo build --release

      - name: Build Rust library
        shell: bash
        run: |
          cargo build --features hwcodec,vram,flutter --lib --release
          if [ ! -f "target/release/librustdesk.dll" ]; then
            echo "ERROR: librustdesk.dll not found after cargo build"
            exit 1
          fi
          echo "librustdesk.dll size: $(wc -c < target/release/librustdesk.dll) bytes"

      - name: Build Flutter Windows app
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Assemble release bundle
        shell: pwsh
        run: |
          Copy-Item target/release/deps/dylib_virtual_display.dll flutter/build/windows/x64/runner/Release/
          Move-Item flutter/build/windows/x64/runner/Release rahbardesk

      - name: Download usbmmidd driver
        run: |
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\Win32" -Recurse -ErrorAction SilentlyContinue
          mv usbmmidd_v2 ./rahbardesk

      - name: Set MSI metadata
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $buildDate = Get-Date -Format 'yyyy-MM-dd HH:mm'
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "APP_BUILD_DATE=$buildDate" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build MSI installer
        shell: pwsh
        run: |
          Push-Location .\res\msi
          python .\preprocess.py --arp --app-name rahbardesk --manufacturer "Rahbar Hesab" -v $env:APP_VERSION --build-date "$env:APP_BUILD_DATE" -d "..\..\rahbardesk"
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          Pop-Location
          Copy-Item .\res\msi\Package\bin\x64\Release\en-us\Package.msi .\rahbardesk-setup.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rahbardesk-windows-x64-flutter
          path: rahbardesk/

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: rahbardesk-windows-x64-msi
          path: .\rahbardesk-setup.msi
